<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サカナクション楽曲APIテスト</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    #search {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      font-size: 16px;
    }

    #songList {
      display: grid;
      gap: 15px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,.1);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .album {
      color: #666;
      margin-top: 5px;
    }

    img {
      width: 120px;
      margin-top: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>サカナクション楽曲API</h1>

<input
  type="text"
  id="search"
  placeholder="曲名を検索..."
>

<div id="songList"></div>

<script>
const API_URL = "https://sakanaction-api.onrender.com/api/songs";

let songs = [];

async function loadSongs() {
  try {
    const response = await fetch(API_URL);
    songs = await response.json();

    renderSongs(songs);
  } catch (error) {
    console.error(error);
    document.getElementById("songList").innerHTML =
      "<p>データ取得失敗</p>";
  }
}

function renderSongs(data) {
  const songList = document.getElementById("songList");

  songList.innerHTML = data.map(song => `
    <div class="card">
      <div class="title">${song.title}</div>
      <div class="album">アルバム: ${song.album}</div>
      <div>発売日: ${song.releaseDate}</div>
      <div>作詞: ${song.lyricist ?? "なし"}</div>

      ${
        song.image
          ? `<img src="${song.image}" alt="${song.title}">`
          : ""
      }
    </div>
  `).join("");
}

document.getElementById("search")
.addEventListener("input", e => {
  const keyword = e.target.value.toLowerCase();

  const filtered = songs.filter(song =>
    song.title.toLowerCase().includes(keyword)
  );

  renderSongs(filtered);
});

loadSongs();
</script>

</body>
</html>
