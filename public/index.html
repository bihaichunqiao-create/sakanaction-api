<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サカナクションAPI</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>サカナクション楽曲API</h1>

  <div class="controls">

    <input type="text" id="search" placeholder="曲名検索">

    <select id="albumFilter">
      <option value="">全アルバム</option>
    </select>

    <select id="sortDate">
      <option value="new">発売日 新しい順</option>
      <option value="old">発売日 古い順</option>
    </select>

  </div>

  <div id="songList"></div>

  <script src="script.js"></script>

</body>

</html>
